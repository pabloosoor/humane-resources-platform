services:
  mysql:
    image: mysql:8.0
    container_name: humane-resources-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: humane_resources
      MYSQL_USER: hr_user
      MYSQL_PASSWORD: hr_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hr-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hr_user", "-phr_password"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

networks:
  hr-network:
    driver: bridge
